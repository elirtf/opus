<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>Opus Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100dvh; font-family: system-ui, sans-serif;
      background: #030712; color: #e5e7eb;
      display: flex; align-items: center; justify-content: center; padding: 1.25rem;
    }
    .card {
      width: 100%; max-width: 22rem;
      background: #111827; border: 1px solid #1f2937; border-radius: 12px;
      padding: 1.25rem;
    }
    h1 { font-size: 1.125rem; margin: 0 0 0.5rem; }
    p { font-size: 0.875rem; color: #9ca3af; margin: 0 0 1rem; line-height: 1.45; }
    label { display: block; font-size: 0.75rem; color: #9ca3af; margin-bottom: 0.35rem; }
    input {
      width: 100%; padding: 0.6rem 0.75rem; border-radius: 8px; border: 1px solid #374151;
      background: #0f172a; color: #f9fafb; font-size: 0.9rem; margin-bottom: 0.75rem;
    }
    input:focus { outline: 2px solid #6366f1; border-color: transparent; }
    button {
      width: 100%; padding: 0.65rem; border-radius: 8px; border: none; font-weight: 600;
      font-size: 0.875rem; cursor: pointer; margin-bottom: 0.5rem;
    }
    .primary { background: #4f46e5; color: white; }
    .primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .secondary { background: transparent; color: #9ca3af; border: 1px solid #374151; }
    .err { color: #fca5a5; font-size: 0.8rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <h1>Connect to Opus</h1>
    <p>Enter the HTTPS URL of your Opus server (same address you use in the browser). Login and live view run in the full Opus web app.</p>
    <label for="url">Server URL</label>
    <input id="url" type="url" inputmode="url" autocomplete="url" placeholder="https://nvr.example.com" />
    <button type="button" class="primary" id="go">Open Opus</button>
    <button type="button" class="secondary" id="clear">Clear saved URL</button>
    <p class="err" id="err" hidden></p>
  </div>
  <script src="./bootstrap.js"></script>
</body>
</html>
