server {
    listen 80;
    server_name _;
    sendfile on;
    tcp_nopush on;

    include /etc/nginx/mime.types;

    # ONVIF discovery can run WS-Discovery + full subnet scans (minutes, not seconds).
    location /api/discovery/ {
        proxy_pass http://opus:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_connect_timeout 90s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        send_timeout 600s;
    }

    # ── Flask API backend ───────────────────────────────────────
    location /api/ {
        proxy_pass http://opus:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_connect_timeout 75s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── go2rtc streaming proxy ──────────────────────────────────
    location /go2rtc/ {
        proxy_pass http://go2rtc:1984/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
        # Allow embedding stream.html in our SPA iframes (go2rtc may send X-Frame-Options: deny).
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;

        proxy_connect_timeout 300;
        proxy_read_timeout 300;
        proxy_send_timeout 300;

        send_timeout 300;
    }

    # HLS playlists should never be cached by clients/proxies.
    # Strip /go2rtc prefix: go2rtc serves /api/stream.m3u8, not /go2rtc/api/stream.m3u8.
    location ~* ^/go2rtc/(.*\.m3u8)$ {
        proxy_pass http://go2rtc:1984/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # HLS media segments can be cached briefly to smooth playback.
    location ~* ^/go2rtc/(.*\.(?:ts|m4s|mp4))$ {
        proxy_pass http://go2rtc:1984/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
        expires 2s;
        add_header Cache-Control "public, max-age=2, s-maxage=2" always;
    }

    location /go2rtc/api/ws {
        proxy_pass http://go2rtc:1984/api/ws$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── React static assets ─────────────────────────────────────
    location /assets/ {
        root /app/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback LAST ───────────────────────────────────────
    location / {
        try_files $uri /index.html;
        root /app/static;
    }
}
